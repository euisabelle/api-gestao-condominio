<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Gestão - Moradores</title>
</h:head>

<h:body style="margin: 50px; font-family: Arial, sans-serif;">
    <h:form id="formulario">

        <p:panel header="Cadastrar Novo Morador">
            <h:panelGrid columns="2" cellpadding="5">
                <p:outputLabel for="nome" value="Nome:" />
                <p:inputText id="nome" value="#{moradorBean.novoMorador.nome}" required="true" />

                <p:outputLabel for="apto" value="Apartamento:" />
                <p:inputText id="apto" value="#{moradorBean.novoMorador.apartamento}" required="true" />

                <p:outputLabel for="email" value="E-mail:" />
                <p:inputText id="email" value="#{moradorBean.novoMorador.email}" required="true" />
            </h:panelGrid>

            <br/>
            <p:commandButton value="Salvar Morador" action="#{moradorBean.salvar}" update="formulario" icon="pi pi-save" />
        </p:panel>

        <br/><br/>

        <p:dataTable id="tabela" value="#{moradorBean.moradores}" var="morador" emptyMessage="Nenhum morador cadastrado ainda.">
            <p:column headerText="ID">
                <h:outputText value="#{morador.id}" />
            </p:column>

            <p:column headerText="Nome">
                <h:outputText value="#{morador.nome}" />
            </p:column>

            <p:column headerText="Apartamento">
                <h:outputText value="#{morador.apartamento}" />
            </p:column>

            <p:column headerText="E-mail">
                <h:outputText value="#{morador.email}" />
            </p:column>
        </p:dataTable>

    </h:form>
</h:body>
</html>
